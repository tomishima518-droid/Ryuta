<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ROBLOX STYLE v4</title>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.150.1/build/three.module.js"
        }
    }
    </script>
    <style>
        :root { --vh: 1vh; }
        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Arial Black', sans-serif; 
            user-select: none; 
            touch-action: none; 
            background: #393b3d;
            height: 100dvh; /* スマホのバーを考慮した高さ */
        }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* ログイン画面 */
        #login-screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #1a1a1a; z-index: 2000; color: white; }
        .login-card { background: #ffffff; color: #333; padding: 25px; border-radius: 15px; width: 80%; max-width: 300px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 15px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 18px; }
        button { width: 100%; padding: 15px; background: #00b06f; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 20px; box-shadow: 0 5px #008a57; }

        /* ゲームUIレイヤー */
        #ui-layer { position: fixed; inset: 0; pointer-events: none; z-index: 100; height: 100dvh; }
        #online-list { position: absolute; top: env(safe-area-inset-top, 10px); right: 10px; background: rgba(0,0,0,0.6); color: white; padding: 5px 12px; border-radius: 15px; font-size: 12px; }
        
        /* ホットバー（少し上に配置） */
        #hotbar { position: absolute; bottom: calc(env(safe-area-inset-bottom, 20px) + 20px); left: 50%; transform: translateX(-50%); display: flex; gap: 8px; pointer-events: auto; }
        .slot { width: 50px; height: 50px; background: rgba(255,255,255,0.9); border: 3px solid #444; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .slot.active { border-color: #00b06f; background: #fff; transform: scale(1.1); }

        /* モバイル操作（位置を微調整） */
        #joystick-area { position: absolute; bottom: 80px; left: 30px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); display: none; pointer-events: auto; }
        #stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: rgba(255,255,255,0.6); border-radius: 50%; }
        #action-btns { position: absolute; bottom: 80px; right: 30px; display: none; flex-direction: column; gap: 15px; pointer-events: auto; }
        .m-btn { width: 75px; height: 75px; background: rgba(0,0,0,0.5); border: 2px solid white; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        
        /* 中央のカーソル */
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid #fff; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; mix-blend-mode: difference; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2 style="margin:0">Roblox Multi</h2>
        <input type="text" id="username" placeholder="名前を入力" maxlength="10">
        <button onclick="joinGame()">PLAY</button>
    </div>
</div>

<div id="ui-layer">
    <div id="online-list">Online: 1</div>
    <div id="crosshair"></div>
    <div id="hotbar">
        <div class="slot active" data-id="1">🧱</div>
        <div class="slot" data-id="2">💎</div>
        <div class="slot" data-id="3">🔥</div>
    </div>
    <div id="joystick-area"><div id="stick"></div></div>
    <div id="action-btns">
        <div class="m-btn" id="btn-jump">JUMP</div>
        <div class="m-btn" id="btn-place" style="background:#00b06f;">PLACE</div>
    </div>
</div>

<script type="module">
    import * as THREE from 'three';

    let scene, camera, renderer, gun, world, myName;
    let myId = "u_" + Math.random().toString(36).substr(2, 7);
    let players = {}, blocks = [];
    let selectedType = 1, moveFwd = 0, moveSide = 0, vY = 0;
    let lon = 0, lat = 0;

    let joyTouchId = null, lookTouchId = null, lastLX, lastLY;
    const blockColors = { 1: 0x8B4513, 2: 0x00ffff, 3: 0xff4500 };

    window.joinGame = () => {
        myName = document.getElementById('username').value || "Steve";
        document.getElementById('login-screen').style.display = 'none';
        if('ontouchstart' in window) {
            document.getElementById('joystick-area').style.display = 'block';
            document.getElementById('action-btns').style.display = 'flex';
        }
        init();
        setupNet();
        animate();
    };

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.2));
        const grid = new THREE.GridHelper(100, 100, 0x888888, 0x444444);
        scene.add(grid);
        camera.position.set(0, 5, 10);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    }

    function setupNet() {
        gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
        world = gun.get('roblox-multi-v4');
        world.get('players').map().on((data, id) => {
            if(!data || id === myId) return;
            if(!players[id]) {
                players[id] = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshStandardMaterial({color: 0x3498db}));
                scene.add(players[id]);
            }
            players[id].position.lerp(new THREE.Vector3(data.x, data.y, data.z), 0.2);
        });
        world.get('blocks').map().on((data) => {
            if(data) createBlock(data.x, data.y, data.z, data.type, false);
        });
    }

    function createBlock(x, y, z, type, sync=true) {
        if(blocks.some(b => b.position.x == x && b.position.y == y && b.position.z == z)) return;
        const b = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshLambertMaterial({color: blockColors[type]}));
        b.position.set(x, y, z);
        scene.add(b);
        blocks.push(b);
        if(sync) world.get('blocks').set({x, y, z, type, t:Date.now()});
    }

    // --- 操作：マルチタッチ & 視点反転 ---
    window.addEventListener('touchstart', (e) => {
        for(let i=0; i<e.changedTouches.length; i++) {
            const t = e.changedTouches[i];
            if(t.clientX > window.innerWidth/2 && lookTouchId === null) {
                lookTouchId = t.identifier;
                lastLX = t.clientX; lastLY = t.clientY;
            }
        }
    });

    window.addEventListener('touchmove', (e) => {
        for(let i=0; i<e.changedTouches.length; i++) {
            const t = e.changedTouches[i];
            if(t.identifier === lookTouchId) {
                lon -= (t.clientX - lastLX) * 0.3;
                lat -= (t.clientY - lastLY) * 0.3; // 視点上下反転（リバース）
                lat = Math.max(-85, Math.min(85, lat));
                lastLX = t.clientX; lastLY = t.clientY;
            }
        }
    });

    window.addEventListener('touchend', (e) => {
        for(let i=0; i<e.changedTouches.length; i++) {
            if(e.changedTouches[i].identifier === lookTouchId) lookTouchId = null;
            if(e.changedTouches[i].identifier === joyTouchId) {
                joyTouchId = null;
                moveFwd = 0; moveSide = 0;
                document.getElementById('stick').style.transform = 'translate(0,0)';
            }
        }
    });

    const stick = document.getElementById('stick');
    document.getElementById('joystick-area').addEventListener('touchstart', (e) => {
        joyTouchId = e.changedTouches[0].identifier;
    });

    document.getElementById('joystick-area').addEventListener('touchmove', (e) => {
        const t = Array.from(e.touches).find(t => t.identifier === joyTouchId);
        if(!t) return;
        const r = e.currentTarget.getBoundingClientRect();
        const dx = t.clientX - (r.left + r.width/2), dy = t.clientY - (r.top + r.height/2);
        const d = Math.min(Math.sqrt(dx*dx+dy*dy), 40);
        const a = Math.atan2(dy, dx);
        stick.style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
        moveFwd = -Math.sin(a)*(d/40); moveSide = Math.cos(a)*(d/40);
    });

    document.getElementById('btn-jump').ontouchstart = () => { if(camera.position.y <= 1.7) vY = 0.22; };
    document.getElementById('btn-place').ontouchstart = () => {
        const ray = new THREE.Raycaster();
        // ここで正確に画面中央（0,0）を狙うように修正
        ray.setFromCamera(new THREE.Vector2(0,0), camera);
        const hits = ray.intersectObjects(blocks.length > 0 ? blocks : [new THREE.Mesh(new THREE.PlaneGeometry(100,100))]);
        if(hits.length > 0) {
            const p = hits[0].point.add(hits[0].face ? hits[0].face.normal.multiplyScalar(0.5) : new THREE.Vector3(0,1,0));
            createBlock(Math.round(p.x), Math.round(p.y), Math.round(p.z), selectedType);
        }
    };

    document.querySelectorAll('.slot').forEach(s => s.onclick = (e) => {
        e.stopPropagation();
        document.querySelectorAll('.slot').forEach(x => x.classList.remove('active'));
        s.classList.add('active');
        selectedType = parseInt(s.dataset.id);
    });

    function animate() {
        requestAnimationFrame(animate);
        const phi = THREE.MathUtils.degToRad(90-lat), theta = THREE.MathUtils.degToRad(lon);
        camera.lookAt(new THREE.Vector3().setFromSphericalCoords(1, phi, theta).add(camera.position));
        const f = new THREE.Vector3(); camera.getWorldDirection(f); f.y = 0; f.normalize();
        const r = new THREE.Vector3().crossVectors(camera.up, f).negate();
        camera.position.addScaledVector(f, moveFwd*0.18); camera.position.addScaledVector(r, moveSide*0.18);
        vY -= 0.012; camera.position.y += vY;
        if(camera.position.y < 1.6) { camera.position.y = 1.6; vY = 0; }
        if(world) world.get('players').get(myId).put({x:camera.position.x, y:camera.position.y, z:camera.position.z, name:myName});
        document.getElementById('online-list').innerText = `Online: ${Object.keys(players).length + 1}`;
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
